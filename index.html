/* --------------- localStorage-backed persistence shim (drop-in for window.storage) --------------- */
window.storage = {
  get: async (key) => {
    const v = localStorage.getItem("bws:" + key);
    return v === null ? null : { key, value: v, shared: false };
  },
  set: async (key, value) => {
    localStorage.setItem("bws:" + key, value);
    return { key, value, shared: false };
  },
  delete: async (key) => {
    localStorage.removeItem("bws:" + key);
    return { key, deleted: true, shared: false };
  },
  list: async (prefix) => {
    const keys = Object.keys(localStorage)
      .filter((k) => k.startsWith("bws:") && (!prefix || k.slice(4).startsWith(prefix)))
      .map((k) => k.slice(4));
    return { keys, shared: false };
  },
};

/* ---------------------------------- storage hook -------------------------------- */

function useAppData() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const loadedOnce = useRef(false);

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(STORAGE_KEY, false);
        setData(res && res.value ? JSON.parse(res.value) : emptyData());
      } catch (e) {
        setData(emptyData());
      } finally {
        setLoading(false);
        loadedOnce.current = true;
      }
    })();
  }, []);

  useEffect(() => {
    if (!loadedOnce.current || data === null) return;
    (async () => {
      try { await window.storage.set(STORAGE_KEY, JSON.stringify(data), false); }
      catch (e) { console.error("save failed", e); }
    })();
  }, [data]);

  return [data, setData, loading];
}

/* --------------------------------- computations --------------------------------- */

function taskAssigned(item, taskId, assignments) {
  return assignments.filter((a) => a.itemId === item.id && a.taskId === taskId).reduce((s, a) => s + Number(a.assignedQty || 0), 0);
}
function taskReturned(item, taskId, assignments) {
  return assignments.filter((a) => a.itemId === item.id && a.taskId === taskId).reduce((s, a) => s + Number(a.returnedQty || 0), 0);
}
function itemTotalQty(item) {
  return item.tasks.reduce((s, t) => s + Number(t.quantity || 0), 0);
}
function itemStock(item, assignments, deliveries) {
  let raw = 0, wip = 0, returnedTotal = 0;
  for (const t of item.tasks) {
    const assigned = taskAssigned(item, t.id, assignments);
    const returned = taskReturned(item, t.id, assignments);
    raw += Math.max(t.quantity - assigned, 0);
    wip += Math.max(assigned - returned, 0);
    returnedTotal += returned;
  }
  const delivered = deliveries.filter((d) => d.itemId === item.id).reduce((s, d) => s + Number(d.deliveredQty || 0), 0);
  const finished = Math.max(returnedTotal - delivered, 0);
  return { raw, wip, finished, returnedTotal, delivered };
}
function itemStatus(item, deliveries) {
  return deliveries.some((d) => d.itemId === item.id) ? "Completed" : "Pending";
}
function assignmentAmount(a, data) {
  const item = data.items.find((i) => i.id === a.itemId);
  const task = item?.tasks.find((t) => t.id === a.taskId);
  const rate = task ? Number(task.ratePerPiece || 0) : 0;
  return Number(a.returnedQty || 0) * rate;
}

          {view === "itemDetail" && <ItemDetail data={data} setData={setData} itemId={itemDetailId} back={() => setView("items")} />}
          {view === "assignments" && <AssignmentsView data={data} setData={setData} />}
          {view === "payslips" && <PayslipsView data={data} setData={setData} />}
          {view === "deliveries" && <DeliveriesView data={data} setData={setData} />}
          {view === "reports" && <ReportsView data={data} />}
        </main>
      </div>
    </div>
  );
}

/* ---------------------------------- dashboard ------------------------------------ */

function Dashboard({ data, goItem }) {
  const pendingItems = data.items.filter((i) => itemStatus(i, data.deliveries) === "Pending");
  const totalRevenue = data.deliveries.reduce((s, d) => s + Number(d.revenue || 0), 0);
  const thisMonth = monthKey(todayStr());
  const monthRevenue = data.deliveries.filter((d) => monthKey(d.deliveredDate) === thisMonth).reduce((s, d) => s + Number(d.revenue || 0), 0);
  const unpaidWages = data.assignments.filter((a) => !a.paid && Number(a.returnedQty) > 0).reduce((s, a) => s + assignmentAmount(a, data), 0);

  let totalRaw = 0, totalWip = 0, totalFinished = 0;
  for (const it of data.items) { const s = itemStock(it, data.assignments, data.deliveries); totalRaw += s.raw; totalWip += s.wip; totalFinished += s.finished; }

  return (
    <div>
      <Header title="Dashboard" subtitle="Snapshot of the workshop right now" />
      <div className="pwt-grid pwt-grid-4">
        <Stat label="Pending items" value={pendingItems.length} sub={`${data.items.length} total`} />
        <Stat label="Revenue this month" value={won(monthRevenue)} sub="from deliveries" />
        <Stat label="Total revenue" value={won(totalRevenue)} sub="all time" />
        <Stat label="Unpaid wages" value={won(unpaidWages)} sub="owed to employees" />
      </div>
      <div className="pwt-grid pwt-grid-2" style={{ marginTop: 16 }}>
        <div className="pwt-card">
          <div className="pwt-stat-label" style={{ marginBottom: 10 }}>Stock overview (pieces)</div>
          <StockLegendRow label="Raw material" value={totalRaw} cls="raw" />
          <StockLegendRow label="With employees (WIP)" value={totalWip} cls="wip" />
          <StockLegendRow label="Finished, ready to deliver" value={totalFinished} cls="fin" />
        </div>
        <div className="pwt-card">
          <div className="pwt-stat-label" style={{ marginBottom: 10 }}>Pending items</div>
          {pendingItems.length === 0 && <div style={{ fontSize: 13, color: "var(--ink-soft)" }}>No pending items — all caught up.</div>}
          {pendingItems.slice(0, 6).map((it) => {
            const co = data.companies.find((c) => c.id === it.companyId);
            return (
              <div key={it.id} onClick={() => goItem(it.id)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid var(--border)", cursor: "pointer", fontSize: 13 }}>
                <div><span style={{ fontWeight: 600 }}>{it.itemName}</span><span style={{ color: "var(--ink-soft)" }}> · {co?.name || "—"} · due {fmtDate(it.dueDate)}</span></div>
                <ChevronRight size={15} color="var(--ink-soft)" />
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function StockLegendRow({ label, value, cls }) {
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13 }}>
        <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ width: 9, height: 9, borderRadius: 2, background: cls === "raw" ? "#9fb0aa" : cls === "wip" ? "var(--warning)" : "var(--success)" }} />{label}
        </span>
        <span className="pwt-mono" style={{ fontWeight: 700 }}>{numFmt(value)}</span>
      </div>
    </div>
  );
}
function Header({ title, subtitle, action }) {
  return (
    <div className="pwt-header">
      <div><div className="pwt-title">{title}</div>{subtitle && <div className="pwt-subtitle">{subtitle}</div>}</div>
      {action}
    </div>
  );
}
function Stat({ label, value, sub }) {
  return (
    <div className="pwt-card">
      <div className="pwt-stat-label">{label}</div>
      <div className="pwt-stat-value">{value}</div>
      {sub && <div className="pwt-stat-sub">{sub}</div>}
    </div>
  );
}

function CompaniesView({ data, setData }) {

    else setData({ ...data, companies: [...data.companies, { id: uid("co"), name: modal.name, contact: modal.contact || "" }] });

    if (data.items.some((i) => i.companyId === id)) { alert("This company has items linked to it and can't be deleted."); return; }

  const filtered = data.companies.filter((c) => c.name.toLowerCase().includes(q.toLowerCase()));
  return (
    <div>

      <div className="pwt-card">

                  <td style={{ fontWeight: 600 }}>{c.name}</td><td>{c.contact || "—"}</td>
                  <td>{data.items.filter((i) => i.companyId === c.id).length}</td>
                  <td style={{ textAlign: "right" }}>
                    <button className="pwt-icon-btn" onClick={() => setModal({ ...c, editId: c.id })}><Edit2 size={14} /></button>
                    <button className="pwt-icon-btn" onClick={() => del(c.id)}><Trash2 size={14} /></button>

        </Modal>
      )}

}

function ItemsView({ data, setData, openItem }) {
  const [modal, setModal] = useState(null);
  const [filter, setFilter] = useState("All");
  const [fSearch, setFSearch] = useState("");
  const [fCompany, setFCompany] = useState("All");
  const [fDueFrom, setFDueFrom] = useState("");
  const [fDueTo, setFDueTo] = useState("");

  const openNew = () => setModal({
    itemName: "", companyId: data.companies[0]?.id || "", receivedDate: todayStr(), dueDate: todayStr(),
    taskType: data.taskTypeHistory[0] || "Assemble", quantity: "", ratePerPiece: "",
  });

  const save = () => {
    if (!modal.companyId) { alert("Select a company first."); return; }
    if (!modal.itemName?.trim()) { alert("Enter an item name."); return; }
    if (!modal.taskType?.trim() || !modal.quantity || !modal.ratePerPiece) { alert("Fill in task type, quantity and rate."); return; }
    const task = { id: uid("task"), taskType: modal.taskType.trim(), quantity: Number(modal.quantity), ratePerPiece: Number(modal.ratePerPiece) };
    const newTypes = data.taskTypeHistory.includes(task.taskType) ? [] : [task.taskType];
    setData({
      ...data,
      items: [...data.items, { id: uid("item"), itemName: modal.itemName.trim(), companyId: modal.companyId, receivedDate: modal.receivedDate, dueDate: modal.dueDate, tasks: [task] }],
      taskTypeHistory: [...data.taskTypeHistory, ...newTypes],
    });
    setModal(null);
  };

  const clearFilters = () => { setFSearch(""); setFCompany("All"); setFDueFrom(""); setFDueTo(""); setFilter("All"); };
  const visible = data.items.filter((it) =>
    (filter === "All" || itemStatus(it, data.deliveries) === filter) &&
    (fCompany === "All" || it.companyId === fCompany) &&
    (fSearch.trim() === "" || it.itemName.toLowerCase().includes(fSearch.trim().toLowerCase()) || it.id.toLowerCase().includes(fSearch.trim().toLowerCase())) &&
    (!fDueFrom || it.dueDate >= fDueFrom) && (!fDueTo || it.dueDate <= fDueTo)
  );

  return (
    <div>
      <Header title="Items" subtitle="Orders of pieces received from companies" action={<button className="pwt-btn accent" onClick={openNew} disabled={data.companies.length === 0}><Plus size={15} /> New item</button>} />
      {data.companies.length === 0 && <div className="pwt-card" style={{ marginBottom: 14, fontSize: 13, color: "var(--warning)" }}>Add a company first before creating an item.</div>}
      <div className="pwt-tabs">{["All", "Pending", "Completed"].map((f) => <div key={f} className={"pwt-tab" + (filter === f ? " active" : "")} onClick={() => setFilter(f)}>{f}</div>)}</div>
      <div className="pwt-filterbar">
        <div><label className="pwt-label">Search item / code</label><input className="pwt-input" value={fSearch} onChange={(e) => setFSearch(e.target.value)} placeholder="Name or code…" /></div>
        <div><label className="pwt-label">Company</label>
          <select className="pwt-select" value={fCompany} onChange={(e) => setFCompany(e.target.value)}>
            <option value="All">All companies</option>
            {data.companies.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select></div>
        <div className="pwt-fb-narrow"><label className="pwt-label">Due from</label><input type="date" className="pwt-input" value={fDueFrom} onChange={(e) => setFDueFrom(e.target.value)} /></div>
        <div className="pwt-fb-narrow"><label className="pwt-label">Due to</label><input type="date" className="pwt-input" value={fDueTo} onChange={(e) => setFDueTo(e.target.value)} /></div>
        <div className="pwt-fb-narrow"><button className="pwt-btn ghost sm" onClick={clearFilters}>Clear filters</button></div>
      </div>
      <div className="pwt-card">
        {visible.length === 0 ? <Empty text="No items match these filters." /> : (
          <table className="pwt-table">
            <thead><tr><th>Item</th><th>Company</th><th>Received</th><th>Due</th><th>Quantity</th><th>Status</th><th></th></tr></thead>
            <tbody>
              {visible.map((it) => {
                const co = data.companies.find((c) => c.id === it.companyId);
                const status = itemStatus(it, data.deliveries);
                return (
                  <tr key={it.id} style={{ cursor: "pointer" }} onClick={() => openItem(it.id)}>
                    <td style={{ fontWeight: 600 }}>{it.itemName} <span className="pwt-ledger-id">{it.id.slice(-6)}</span></td>
                    <td>{co?.name || "—"}</td><td>{fmtDate(it.receivedDate)}</td><td>{fmtDate(it.dueDate)}</td>
                    <td className="pwt-mono">{numFmt(itemTotalQty(it))}</td>
                    <td><span className={"pwt-badge " + (status === "Completed" ? "completed" : "pending")}>{status}</span></td>
                    <td><ChevronRight size={14} color="var(--ink-soft)" /></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
      {modal && (
        <Modal title="New item" onClose={() => setModal(null)} wide>
          <div className="pwt-field"><label className="pwt-label">Item name</label><input className="pwt-input" list="item-name-options" value={modal.itemName} onChange={(e) => setModal({ ...modal, itemName: e.target.value })} placeholder="e.g. Rubber Grommets — Lot 1" autoFocus />
            <datalist id="item-name-options">{[...new Set(data.items.map((i) => i.itemName))].map((n) => <option key={n} value={n} />)}</datalist>
          </div>
          <div className="pwt-grid pwt-grid-2">
            <div className="pwt-field"><label className="pwt-label">Company</label>
              <select className="pwt-select" value={modal.companyId} onChange={(e) => setModal({ ...modal, companyId: e.target.value })}>
                {data.companies.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select></div>
            <div />
            <div className="pwt-field"><label className="pwt-label">Received date</label><input type="date" className="pwt-input" value={modal.receivedDate} onChange={(e) => setModal({ ...modal, receivedDate: e.target.value })} /></div>
            <div className="pwt-field"><label className="pwt-label">Due date</label><input type="date" className="pwt-input" value={modal.dueDate} onChange={(e) => setModal({ ...modal, dueDate: e.target.value })} /></div>
          </div>
          <div className="pwt-divider" />
          <div className="pwt-grid pwt-grid-3">
            <div className="pwt-field"><label className="pwt-label">Task type</label>
              <input className="pwt-input" list="task-type-options" value={modal.taskType} onChange={(e) => setModal({ ...modal, taskType: e.target.value })} placeholder="Type or pick…" /></div>
            <div className="pwt-field"><label className="pwt-label">Quantity (pcs)</label><input className="pwt-input" type="number" min="0" value={modal.quantity} onChange={(e) => setModal({ ...modal, quantity: e.target.value })} placeholder="0" /></div>
            <div className="pwt-field"><label className="pwt-label">Rate/pc (₩)</label><input className="pwt-input" type="number" min="0" value={modal.ratePerPiece} onChange={(e) => setModal({ ...modal, ratePerPiece: e.target.value })} placeholder="0" /></div>
          </div>
          <datalist id="task-type-options">{data.taskTypeHistory.map((t) => <option key={t} value={t} />)}</datalist>
          <div className="pwt-divider" />
          <button className="pwt-btn accent" style={{ width: "100%", justifyContent: "center" }} onClick={save}>Create item</button>
        </Modal>
      )}
    </div>
  );
}

function ItemDetail({ data, setData, itemId, back }) {
  const item = data.items.find((i) => i.id === itemId);
  const [editTask, setEditTask] = useState(null);
  const [confirm, setConfirm] = useState(null);

  if (!item) return <div>Item not found. <button className="pwt-btn ghost" onClick={back}>Back</button></div>;
  const co = data.companies.find((c) => c.id === item.companyId);
  const status = itemStatus(item, data.deliveries);
  const stock = itemStock(item, data.assignments, data.deliveries);

  const applyTaskEdit = () => {
    const newType = editTask.taskType?.trim() || "Untitled task";
    setData({
      ...data,
      items: data.items.map((it) => it.id !== item.id ? it : { ...it, tasks: it.tasks.map((t) => t.id === editTask.id ? { ...t, taskType: newType, quantity: Number(editTask.quantity), ratePerPiece: Number(editTask.ratePerPiece) } : t) }),
      taskTypeHistory: data.taskTypeHistory.includes(newType) ? data.taskTypeHistory : [...data.taskTypeHistory, newType],
    });
    setEditTask(null);
  };

  return (
    <div>
      <button className="pwt-btn ghost sm" style={{ marginBottom: 12 }} onClick={back}>← Back to items</button>
      <Header title={item.itemName} subtitle={`${co?.name || "—"} · ${item.id.slice(-6)} · received ${fmtDate(item.receivedDate)} · due ${fmtDate(item.dueDate)}`} action={<span className={"pwt-badge " + (status === "Completed" ? "completed" : "pending")}>{status}</span>} />
      <div className="pwt-grid pwt-grid-3" style={{ marginBottom: 16 }}>
        <Stat label="Raw (unassigned)" value={numFmt(stock.raw)} />
        <Stat label="With employees (WIP)" value={numFmt(stock.wip)} />
        <Stat label="Finished, undelivered" value={numFmt(stock.finished)} />
      </div>
      <div className="pwt-card">
        <div className="pwt-stat-label" style={{ marginBottom: 10 }}>Tasks in this item</div>
        <table className="pwt-table">
          <thead><tr><th>Task type</th><th>Quantity</th><th>Rate/pc</th><th>Assigned</th><th>Returned</th><th>Raw left</th><th></th></tr></thead>
          <tbody>
            {item.tasks.map((t) => {
              const assigned = taskAssigned(item, t.id, data.assignments);
              const returned = taskReturned(item, t.id, data.assignments);
              return (
                <tr key={t.id}>
                  <td style={{ fontWeight: 600 }}>{t.taskType}</td>
                  <td className="pwt-mono">{numFmt(t.quantity)}</td>
                  <td className="pwt-mono">{won(t.ratePerPiece)}</td>
                  <td className="pwt-mono">{numFmt(assigned)}</td>
                  <td className="pwt-mono">{numFmt(returned)}</td>
                  <td className="pwt-mono">{numFmt(Math.max(t.quantity - assigned, 0))}</td>
                  <td><button className="pwt-icon-btn" onClick={() => setEditTask({ ...t })}><Edit2 size={14} /></button></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div className="pwt-card" style={{ marginTop: 14 }}>
        <div className="pwt-stat-label" style={{ marginBottom: 10 }}>Work assignments for this item</div>
        {data.assignments.filter((a) => a.itemId === item.id).length === 0 ? <Empty text="No work assigned yet — go to Work Assignment to assign pieces." /> : (
          <table className="pwt-table">
            <thead><tr><th>Employee</th><th>Task</th><th>Assigned</th><th>Returned</th><th>Status</th></tr></thead>
            <tbody>
              {data.assignments.filter((a) => a.itemId === item.id).map((a) => {
                const emp = data.employees.find((e) => e.id === a.employeeId);
                const task = item.tasks.find((t) => t.id === a.taskId);
                return (
                  <tr key={a.id}>
                    <td style={{ fontWeight: 600 }}>{emp?.name || "—"}</td><td>{task?.taskType || "—"}</td>
                    <td className="pwt-mono">{numFmt(a.assignedQty)}</td><td className="pwt-mono">{numFmt(a.returnedQty)}</td>
                    <td><span className={"pwt-badge " + (a.status === "Returned" ? "completed" : "progress")}>{a.status}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>

      {editTask && (
        <Modal title={`Edit task — ${editTask.taskType}`} onClose={() => setEditTask(null)} narrow>
          <div className="pwt-note">Editing this can throw off stock calculations already assigned to employees. Only change it if the real details differ from what was entered.</div>
          <div className="pwt-field"><label className="pwt-label">Task type</label>
            <input className="pwt-input" list="task-type-options-edit" value={editTask.taskType} onChange={(e) => setEditTask({ ...editTask, taskType: e.target.value })} />
            <datalist id="task-type-options-edit">{data.taskTypeHistory.map((t) => <option key={t} value={t} />)}</datalist>
          </div>
          <div className="pwt-field"><label className="pwt-label">Quantity (pcs)</label><input className="pwt-input" type="number" value={editTask.quantity} onChange={(e) => setEditTask({ ...editTask, quantity: e.target.value })} /></div>
          <div className="pwt-field"><label className="pwt-label">Rate per piece (₩)</label><input className="pwt-input" type="number" value={editTask.ratePerPiece} onChange={(e) => setEditTask({ ...editTask, ratePerPiece: e.target.value })} /></div>
          <button className="pwt-btn accent" style={{ width: "100%", justifyContent: "center" }} onClick={() => setConfirm({ message: "Really update this task's type, quantity and rate?", onYes: () => { applyTaskEdit(); setConfirm(null); } })}>Save changes</button>
        </Modal>
      )}
      {confirm && <ConfirmDialog message={confirm.message} onYes={confirm.onYes} onNo={() => setConfirm(null)} />}
    </div>
  );
}

/* --------------------------------- assignments ------------------------------------ */

function AssignmentsView({ data, setData }) {
  const [modal, setModal] = useState(null);
  const [returnModal, setReturnModal] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [filter, setFilter] = useState("Open");
  const [fItem, setFItem] = useState("All");
  const [fEmployee, setFEmployee] = useState("All");

  const openItems = data.items.filter((it) => itemStatus(it, data.deliveries) === "Pending" && it.tasks[0] && it.tasks[0].quantity - taskAssigned(it, it.tasks[0].id, data.assignments) > 0);
  const openNew = () => { const first = openItems[0]; setModal({ itemId: first?.id || "", taskId: first?.tasks[0]?.id || "", employeeId: data.employees[0]?.id || "", assignedQty: "", assignedDate: todayStr() }); };
  const selectedItem = modal ? data.items.find((it) => it.id === modal.itemId) : null;
  const selectedTask = selectedItem ? selectedItem.tasks[0] : null;
  const rawLeft = selectedItem && selectedTask ? Math.max(selectedTask.quantity - taskAssigned(selectedItem, selectedTask.id, data.assignments), 0) : 0;

  const save = () => {
    if (!modal.itemId || !modal.taskId || !modal.employeeId || !modal.assignedQty) { alert("Fill in all fields."); return; }
    setData({
      ...data, assignments: [...data.assignments, {
        id: uid("asg"), itemId: modal.itemId, taskId: modal.taskId, employeeId: modal.employeeId,
        assignedQty: Number(modal.assignedQty), returnedQty: 0, assignedDate: modal.assignedDate, returnedDate: null, status: "In Progress", paid: false,
      }],
    });
    setModal(null);
  };

  const commitReturn = (a, newAssignedQty) => {
    const status = a.fullyComplete ? "Returned" : "In Progress";
    setData({
      ...data,
      assignments: data.assignments.map((x) => x.id === a.id ? { ...x, returnedQty: Number(a.returnedQty), returnedDate: a.returnedDate || todayStr(), assignedQty: newAssignedQty != null ? newAssignedQty : x.assignedQty, status } : x),
    });
    setReturnModal(null); setConfirm(null);
  };

  const saveReturn = () => {
    const a = returnModal;
    const returnedQty = Number(a.returnedQty);
    if (returnedQty < 0) { alert("Returned quantity can't be negative."); return; }
    if (a.fullyComplete && returnedQty !== Number(a.assignedQty)) {
      setConfirm({
        message: `Returned quantity (${numFmt(returnedQty)}) is different from the assigned quantity (${numFmt(a.assignedQty)}). Update the assigned quantity to match?`,
        onYes: () => commitReturn(a, returnedQty),
        onNo: () => commitReturn(a, null),
      });
      return;
    }
    commitReturn(a, null);
  };

  const list = data.assignments.filter((a) =>
    (filter === "All" || (filter === "Open" ? a.status !== "Returned" : a.status === "Returned")) &&
    (fItem === "All" || a.itemId === fItem) && (fEmployee === "All" || a.employeeId === fEmployee)
  );
  const clearFilters = () => { setFItem("All"); setFEmployee("All"); setFilter("All"); };

  return (
    <div>
      <Header title="Work Assignment" subtitle="Give pieces to employees and record what comes back" action={<button className="pwt-btn accent" onClick={openNew} disabled={openItems.length === 0 || data.employees.length === 0}><Plus size={15} /> Assign work</button>} />
      {(openItems.length === 0 || data.employees.length === 0) && <div className="pwt-card" style={{ marginBottom: 14, fontSize: 13, color: "var(--warning)" }}>You need at least one pending item with raw pieces left, and one employee, before assigning work.</div>}
      <div className="pwt-tabs">{["Open", "Returned", "All"].map((f) => <div key={f} className={"pwt-tab" + (filter === f ? " active" : "")} onClick={() => setFilter(f)}>{f}</div>)}</div>
      <div className="pwt-filterbar">
        <div><label className="pwt-label">Item</label>
          <select className="pwt-select" value={fItem} onChange={(e) => setFItem(e.target.value)}>
            <option value="All">All items</option>
            {data.items.map((it) => <option key={it.id} value={it.id}>{itemLabel(it)}</option>)}
          </select></div>
        <div><label className="pwt-label">Employee</label>
          <select className="pwt-select" value={fEmployee} onChange={(e) => setFEmployee(e.target.value)}>
            <option value="All">All employees</option>
            {data.employees.map((e) => <option key={e.id} value={e.id}>{e.name}</option>)}
          </select></div>
        <div className="pwt-fb-narrow"><button className="pwt-btn ghost sm" onClick={clearFilters}>Clear filters</button></div>
      </div>
      <div className="pwt-card">
        {list.length === 0 ? <Empty text="No work assignments match these filters." /> : (
          <table className="pwt-table">
            <thead><tr><th>Employee</th><th>Item</th><th>Task</th><th>Assigned</th><th>Returned</th><th>Status</th><th></th></tr></thead>
            <tbody>
              {list.slice().reverse().map((a) => {
                const emp = data.employees.find((e) => e.id === a.employeeId);
                const item = data.items.find((it) => it.id === a.itemId);
                const task = item?.tasks.find((t) => t.id === a.taskId);
                return (
                  <tr key={a.id}>
                    <td style={{ fontWeight: 600 }}>{emp?.name || "—"}</td>
                    <td>{item?.itemName || "—"} <span className="pwt-ledger-id">{item?.id.slice(-6)}</span></td>
                    <td>{task?.taskType || "—"}</td>
                    <td className="pwt-mono">{numFmt(a.assignedQty)}</td><td className="pwt-mono">{numFmt(a.returnedQty)}</td>
                    <td><span className={"pwt-badge " + (a.status === "Returned" ? "completed" : "progress")}>{a.status}</span></td>
                    <td style={{ textAlign: "right" }}>{a.status !== "Returned" && <button className="pwt-btn ghost sm" onClick={() => setReturnModal({ ...a, returnedQty: a.returnedQty || "", fullyComplete: false })}>Update return</button>}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>

      {modal && (
        <Modal title="Assign work to employee" onClose={() => setModal(null)}>
          <div className="pwt-field"><label className="pwt-label">Item</label>
            <select className="pwt-select" value={modal.itemId} onChange={(e) => { const it = data.items.find((x) => x.id === e.target.value); setModal({ ...modal, itemId: e.target.value, taskId: it?.tasks[0]?.id || "" }); }}>
              {openItems.map((it) => <option key={it.id} value={it.id}>{itemLabel(it)}</option>)}
            </select></div>
          {selectedTask && (
            <div className="pwt-note">Task: <b>{selectedTask.taskType}</b> — {numFmt(rawLeft)} pieces left unassigned @ {won(selectedTask.ratePerPiece)}/pc</div>
          )}
          <div className="pwt-field"><label className="pwt-label">Employee</label>
            <select className="pwt-select" value={modal.employeeId} onChange={(e) => setModal({ ...modal, employeeId: e.target.value })}>
              {data.employees.map((e) => <option key={e.id} value={e.id}>{e.name}</option>)}
            </select></div>
          <div className="pwt-grid pwt-grid-2">
            <div className="pwt-field"><label className="pwt-label">Quantity to assign</label><input className="pwt-input" type="number" min="0" value={modal.assignedQty} onChange={(e) => setModal({ ...modal, assignedQty: e.target.value })} /></div>
            <div className="pwt-field"><label className="pwt-label">Assigned date</label><input type="date" className="pwt-input" value={modal.assignedDate} onChange={(e) => setModal({ ...modal, assignedDate: e.target.value })} /></div>
          </div>
          <button className="pwt-btn accent" style={{ width: "100%", justifyContent: "center" }} onClick={save}>Assign</button>
        </Modal>
      )}

      {returnModal && (
        <Modal title="Update returned quantity" onClose={() => setReturnModal(null)}>
          <div style={{ fontSize: 13, color: "var(--ink-soft)", marginBottom: 10 }}>Assigned: <b className="pwt-mono">{numFmt(returnModal.assignedQty)}</b> pieces</div>
          <div className="pwt-field"><label className="pwt-label">Returned quantity so far</label><input className="pwt-input" type="number" min="0" value={returnModal.returnedQty} onChange={(e) => setReturnModal({ ...returnModal, returnedQty: e.target.value })} /></div>
          <div className="pwt-field"><label className="pwt-label">Return date</label><input type="date" className="pwt-input" value={returnModal.returnedDate || todayStr()} onChange={(e) => setReturnModal({ ...returnModal, returnedDate: e.target.value })} /></div>
          <div className="pwt-check-row">
            <input type="checkbox" checked={returnModal.fullyComplete} onChange={(e) => setReturnModal({ ...returnModal, fullyComplete: e.target.checked })} id="fc" />
            <label htmlFor="fc">Mark as fully complete (employee is done with this work)</label>
          </div>
          <button className="pwt-btn accent" style={{ width: "100%", justifyContent: "center" }} onClick={saveReturn}>Save</button>
        </Modal>
      )}
      {confirm && <ConfirmDialog message={confirm.message} onYes={confirm.onYes} onNo={confirm.onNo} />}
    </div>
  );
}

/* ---------------------------------- payslips --------------------------------------- */

function PayslipsView({ data, setData }) {
  const [gen, setGen] = useState(null);
  const [printSlip, setPrintSlip] = useState(null);
  const [fEmployee, setFEmployee] = useState("All");
  const [fFrom, setFFrom] = useState("");
  const [fTo, setFTo] = useState("");

  const openGen = () => setGen({ employeeId: data.employees[0]?.id || "", periodType: "Month", start: todayStr().slice(0, 7) + "-01", end: todayStr() });

  const previewItems = useMemo(() => {
    if (!gen || !gen.employeeId) return [];
    return data.assignments.filter((a) => a.employeeId === gen.employeeId && !a.paid && a.returnedQty > 0 && a.returnedDate >= gen.start && a.returnedDate <= gen.end)
      .map((a) => {
        const item = data.items.find((i) => i.id === a.itemId);
        const task = item?.tasks.find((t) => t.id === a.taskId);
        return { assignmentId: a.id, itemId: a.itemId, itemName: item?.itemName, taskType: task?.taskType, qty: a.returnedQty, rate: task?.ratePerPiece || 0, amount: a.returnedQty * (task?.ratePerPiece || 0) };
      });
  }, [gen, data]);
  const previewTotal = previewItems.reduce((s, i) => s + i.amount, 0);

  const generate = () => {
    if (previewItems.length === 0) { alert("No unpaid returned work found for this employee in the selected period."); return; }
    const payment = { id: uid("pay"), employeeId: gen.employeeId, periodStart: gen.start, periodEnd: gen.end, items: previewItems, total: previewTotal, generatedDate: todayStr() };
    setData({ ...data, payments: [...data.payments, payment], assignments: data.assignments.map((a) => previewItems.some((i) => i.assignmentId === a.id) ? { ...a, paid: true } : a) });
    setGen(null); setPrintSlip(payment);
  };

  const share = (payment) => {
    const emp = data.employees.find((e) => e.id === payment.employeeId);
    const text = `Payslip for ${emp?.name}\nPeriod: ${fmtDate(payment.periodStart)} to ${fmtDate(payment.periodEnd)}\nPieces paid: ${payment.items.reduce((s, i) => s + i.qty, 0)}\nTotal: ${won(payment.total)}`;
    if (navigator.share) navigator.share({ title: "Payslip", text }).catch(() => {});
    else { const phone = (emp?.contact || "").replace(/[^0-9]/g, ""); window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, "_blank"); }
  };

  const clearFilters = () => { setFEmployee("All"); setFFrom(""); setFTo(""); };
  const filteredPayments = data.payments.filter((p) =>
    (fEmployee === "All" || p.employeeId === fEmployee) &&
    (!fFrom || p.periodEnd >= fFrom) && (!fTo || p.periodStart <= fTo)
  );

  return (
    <div>
      <Header title="Payslips" subtitle="Generate and share employee payments for a period" action={<button className="pwt-btn accent" onClick={openGen} disabled={data.employees.length === 0}><Plus size={15} /> Generate payslip</button>} />
      <div className="pwt-filterbar">
        <div><label className="pwt-label">Employee</label>
          <select className="pwt-select" value={fEmployee} onChange={(e) => setFEmployee(e.target.value)}>
            <option value="All">All employees</option>
            {data.employees.map((e) => <option key={e.id} value={e.id}>{e.name}</option>)}
          </select></div>
        <div className="pwt-fb-narrow"><label className="pwt-label">Period from</label><input type="date" className="pwt-input" value={fFrom} onChange={(e) => setFFrom(e.target.value)} /></div>
        <div className="pwt-fb-narrow"><label className="pwt-label">Period to</label><input type="date" className="pwt-input" value={fTo} onChange={(e) => setFTo(e.target.value)} /></div>
        <div className="pwt-fb-narrow"><button className="pwt-btn ghost sm" onClick={clearFilters}>Clear filters</button></div>
      </div>
      <div className="pwt-card">
        {filteredPayments.length === 0 ? <Empty text="No payslips match these filters." /> : (
          <table className="pwt-table">
            <thead><tr><th>Employee</th><th>Period</th><th>Pieces</th><th>Total</th><th>Generated</th><th></th></tr></thead>
            <tbody>
              {filteredPayments.slice().reverse().map((p) => {
                const emp = data.employees.find((e) => e.id === p.employeeId);
                return (
                  <tr key={p.id}>
                    <td style={{ fontWeight: 600 }}>{emp?.name || "—"}</td><td>{fmtDate(p.periodStart)} → {fmtDate(p.periodEnd)}</td>
                    <td className="pwt-mono">{numFmt(p.items.reduce((s, i) => s + i.qty, 0))}</td><td className="pwt-mono">{won(p.total)}</td><td>{fmtDate(p.generatedDate)}</td>
                    <td style={{ textAlign: "right", display: "flex", gap: 4, justifyContent: "flex-end" }}>
                      <button className="pwt-icon-btn" onClick={() => setPrintSlip(p)}><Printer size={14} /></button>
                      <button className="pwt-icon-btn" onClick={() => share(p)}><Share2 size={14} /></button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
      {gen && (
        <Modal title="Generate payslip" onClose={() => setGen(null)} wide>
          <div className="pwt-grid pwt-grid-2">
            <div className="pwt-field"><label className="pwt-label">Employee</label>
              <select className="pwt-select" value={gen.employeeId} onChange={(e) => setGen({ ...gen, employeeId: e.target.value })}>
                {data.employees.map((e) => <option key={e.id} value={e.id}>{e.name}</option>)}
              </select></div>
            <div className="pwt-field"><label className="pwt-label">Period type</label>
              <select className="pwt-select" value={gen.periodType} onChange={(e) => {
                const pt = e.target.value; let start = gen.start, end = todayStr();
                if (pt === "Week") { const d = new Date(); d.setDate(d.getDate() - 7); start = d.toISOString().slice(0, 10); }
                if (pt === "Month") start = todayStr().slice(0, 7) + "-01";
                setGen({ ...gen, periodType: pt, start, end });
              }}><option>Week</option><option>Month</option><option>Custom</option></select></div>
            <div className="pwt-field"><label className="pwt-label">From</label><input type="date" className="pwt-input" value={gen.start} onChange={(e) => setGen({ ...gen, start: e.target.value })} /></div>
            <div className="pwt-field"><label className="pwt-label">To</label><input type="date" className="pwt-input" value={gen.end} onChange={(e) => setGen({ ...gen, end: e.target.value })} /></div>
          </div>
          <div className="pwt-divider" />
          <div className="pwt-stat-label" style={{ marginBottom: 8 }}>Unpaid returned work in this period</div>
          {previewItems.length === 0 ? <div style={{ fontSize: 13, color: "var(--ink-soft)" }}>Nothing found — try widening the date range.</div> : (
            <table className="pwt-table">
              <thead><tr><th>Item</th><th>Task</th><th>Qty</th><th>Rate</th><th>Amount</th></tr></thead>
              <tbody>{previewItems.map((i) => (
                <tr key={i.assignmentId}><td>{i.itemName}</td><td>{i.taskType}</td><td className="pwt-mono">{numFmt(i.qty)}</td><td className="pwt-mono">{won(i.rate)}</td><td className="pwt-mono">{won(i.amount)}</td></tr>
              ))}</tbody>
            </table>
          )}
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 10, fontWeight: 700 }}><span>Total</span><span className="pwt-mono">{won(previewTotal)}</span></div>
          <div className="pwt-divider" />
          <button className="pwt-btn accent" style={{ width: "100%", justifyContent: "center" }} onClick={generate} disabled={previewItems.length === 0}>Generate payslip</button>
        </Modal>
      )}
      {printSlip && <PrintPayslip data={data} payment={printSlip} onClose={() => setPrintSlip(null)} onShare={() => share(printSlip)} />}
    </div>
  );
}

function PrintPayslip({ data, payment, onClose, onShare }) {
  const emp = data.employees.find((e) => e.id === payment.employeeId);
  return (
    <div className="pwt-modal-overlay pwt-noprint" onClick={onClose}>
      <div className="pwt-modal wide" onClick={(e) => e.stopPropagation()}>
        <div className="pwt-modal-head pwt-noprint"><div className="pwt-modal-title">Payslip preview</div><button className="pwt-close-btn" onClick={onClose}><X size={18} /></button></div>
        <div className="pwt-print-sheet">
          <h2 style={{ marginBottom: 2 }}>Payslip</h2>
          <div style={{ color: "#56645f", fontSize: 13, marginBottom: 18 }}>Generated {fmtDate(payment.generatedDate)}</div>
          <div className="pwt-grid pwt-grid-2" style={{ marginBottom: 16 }}>
            <div><div className="pwt-label">Employee</div><div style={{ fontWeight: 600 }}>{emp?.name}</div></div>
            <div><div className="pwt-label">Period</div><div>{fmtDate(payment.periodStart)} → {fmtDate(payment.periodEnd)}</div></div>
            <div><div className="pwt-label">Bank</div><div>{emp?.bankName === "Other" ? emp?.bankOther : emp?.bankName} — {emp?.accountNumber}</div></div>
            <div><div className="pwt-label">Account holder</div><div>{emp?.accountHolder || emp?.name}</div></div>
          </div>
          <table className="pwt-table">
            <thead><tr><th>Item</th><th>Task</th><th>Qty</th><th>Rate</th><th>Amount</th></tr></thead>
            <tbody>{payment.items.map((i) => (
              <tr key={i.assignmentId}><td>{i.itemName}</td><td>{i.taskType}</td><td className="pwt-mono">{numFmt(i.qty)}</td><td className="pwt-mono">{won(i.rate)}</td><td className="pwt-mono">{won(i.amount)}</td></tr>
            ))}</tbody>
          </table>
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 14, fontSize: 17, fontWeight: 700 }}><span>Total due</span><span className="pwt-mono">{won(payment.total)}</span></div>
        </div>
        <div className="pwt-noprint" style={{ display: "flex", gap: 8, marginTop: 16 }}>
          <button className="pwt-btn ghost" onClick={() => window.print()}><Printer size={14} /> Print / Save PDF</button>
          <button className="pwt-btn accent" onClick={onShare}><Share2 size={14} /> Share to employee</button>
        </div>
      </div>
    </div>
  );
}

/* --------------------------------- deliveries --------------------------------------- */

function DeliveriesView({ data, setData }) {
  const [modal, setModal] = useState(null);
  const [editModal, setEditModal] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [printNote, setPrintNote] = useState(null);

  const deliverableItems = data.items.filter((it) => itemStatus(it, data.deliveries) === "Pending");
  const openNew = () => {
    const it = deliverableItems[0];
    setModal({ itemId: it?.id || "", deliveredQty: it ? String(itemTotalQty(it)) : "", deliveredDate: todayStr(), ratePerPiece: "" });
  };

  const commitDelivery = (qty) => {
    const revenue = qty * Number(modal.ratePerPiece);
    const delivery = { id: uid("del"), itemId: modal.itemId, deliveredQty: qty, deliveredDate: modal.deliveredDate, ratePerPiece: Number(modal.ratePerPiece), revenue };
    setData({ ...data, deliveries: [...data.deliveries, delivery] });
    setModal(null); setConfirm(null); setPrintNote(delivery);
  };

  const checkQtyMatch = () => {
    const item = data.items.find((i) => i.id === modal.itemId);
    const qty = Number(modal.deliveredQty);
    const planned = itemTotalQty(item);
    if (qty !== planned) {
      setConfirm({
        message: `Delivered quantity (${numFmt(qty)}) doesn't match this item's original total quantity (${numFmt(planned)}). Set the delivered quantity to ${numFmt(planned)} to match?`,
        onYes: () => commitDelivery(planned),
        onNo: () => setConfirm(null),
        noHint: "Delivery will not be recorded — you can adjust the quantity and try again.",
      });
      return;
    }
    commitDelivery(qty);
  };

  const save = () => {
    const item = data.items.find((i) => i.id === modal.itemId);
    const qty = Number(modal.deliveredQty);
    if (!qty || qty <= 0) { alert("Enter a delivered quantity."); return; }
    if (!modal.ratePerPiece) { alert("Enter the rate the company pays per piece."); return; }
    const stock = itemStock(item, data.assignments, data.deliveries);
    if (stock.raw > 0 || stock.wip > 0) {
      setConfirm({
        message: `This item still has pieces not fully returned by employees (${numFmt(stock.raw)} raw, ${numFmt(stock.wip)} still with employees). Continue with delivery anyway?`,
        onYes: () => { setConfirm(null); checkQtyMatch(); },
        onNo: () => setConfirm(null),
      });
      return;
    }
    checkQtyMatch();
  };

  const saveEdit = () => {
    const qty = Number(editModal.deliveredQty);
    if (!qty || qty <= 0) { alert("Enter a delivered quantity."); return; }
    if (!editModal.ratePerPiece) { alert("Enter the rate the company pays per piece."); return; }
    const revenue = qty * Number(editModal.ratePerPiece);
    setData({
      ...data,
      deliveries: data.deliveries.map((d) => d.id === editModal.id ? { ...d, deliveredQty: qty, ratePerPiece: Number(editModal.ratePerPiece), deliveredDate: editModal.deliveredDate, revenue } : d),
    });
    setEditModal(null);
  };

  const askDelete = (d) => {
    const item = data.items.find((i) => i.id === d.itemId);
    setConfirm({
      message: `Delete this delivery record for "${item?.itemName || "this item"}" (${numFmt(d.deliveredQty)} pcs, ${won(d.revenue)})? The item will become available for assignment and delivery again.`,
      onYes: () => { setData({ ...data, deliveries: data.deliveries.filter((x) => x.id !== d.id) }); setConfirm(null); },
      onNo: () => setConfirm(null),
    });
  };

  const [fItem, setFItem] = useState("All");
  const [fCompany, setFCompany] = useState("All");
  const [fFrom, setFFrom] = useState("");
  const [fTo, setFTo] = useState("");
  const clearFilters = () => { setFItem("All"); setFCompany("All"); setFFrom(""); setFTo(""); };
  const filteredDeliveries = data.deliveries.filter((d) => {
    const item = data.items.find((i) => i.id === d.itemId);
    return (fItem === "All" || d.itemId === fItem) &&
      (fCompany === "All" || item?.companyId === fCompany) &&
      (!fFrom || d.deliveredDate >= fFrom) && (!fTo || d.deliveredDate <= fTo);
  });

  return (
    <div>
      <Header title="Deliveries" subtitle="Send the finished item back to the company and record revenue" action={<button className="pwt-btn accent" onClick={openNew} disabled={deliverableItems.length === 0}><Plus size={15} /> New delivery</button>} />
      {deliverableItems.length === 0 && <div className="pwt-card" style={{ marginBottom: 14, fontSize: 13, color: "var(--warning)" }}>No items are ready for delivery yet (or everything has already been delivered).</div>}
      <div className="pwt-filterbar">
        <div><label className="pwt-label">Item</label>
          <select className="pwt-select" value={fItem} onChange={(e) => setFItem(e.target.value)}>
            <option value="All">All items</option>
            {data.items.map((it) => <option key={it.id} value={it.id}>{itemLabel(it)}</option>)}
          </select></div>
        <div><label className="pwt-label">Company</label>
          <select className="pwt-select" value={fCompany} onChange={(e) => setFCompany(e.target.value)}>
            <option value="All">All companies</option>
            {data.companies.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select></div>
        <div className="pwt-fb-narrow"><label className="pwt-label">From</label><input type="date" className="pwt-input" value={fFrom} onChange={(e) => setFFrom(e.target.value)} /></div>
        <div className="pwt-fb-narrow"><label className="pwt-label">To</label><input type="date" className="pwt-input" value={fTo} onChange={(e) => setFTo(e.target.value)} /></div>
        <div className="pwt-fb-narrow"><button className="pwt-btn ghost sm" onClick={clearFilters}>Clear filters</button></div>
      </div>
      <div className="pwt-card">
        {filteredDeliveries.length === 0 ? <Empty text="No deliveries match these filters." /> : (
          <table className="pwt-table">
            <thead><tr><th>Item</th><th>Company</th><th>Delivered</th><th>Rate</th><th>Revenue</th><th>Date</th><th></th></tr></thead>
            <tbody>
              {filteredDeliveries.slice().reverse().map((d) => {
                const item = data.items.find((i) => i.id === d.itemId);
                const co = data.companies.find((c) => c.id === item?.companyId);
                return (
                  <tr key={d.id}>
                    <td>{item?.itemName || "—"} <span className="pwt-ledger-id">{d.itemId.slice(-6)}</span></td>
                    <td style={{ fontWeight: 600 }}>{co?.name || "—"}</td>
                    <td className="pwt-mono">{numFmt(d.deliveredQty)}</td><td className="pwt-mono">{won(d.ratePerPiece)}</td><td className="pwt-mono">{won(d.revenue)}</td>
                    <td>{fmtDate(d.deliveredDate)}</td>
                    <td style={{ textAlign: "right", display: "flex", gap: 2, justifyContent: "flex-end" }}>
                      <button className="pwt-icon-btn" onClick={() => setPrintNote(d)}><Printer size={14} /></button>
                      <button className="pwt-icon-btn" onClick={() => setEditModal({ ...d })}><Edit2 size={14} /></button>
                      <button className="pwt-icon-btn" onClick={() => askDelete(d)}><Trash2 size={14} /></button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
      {modal && (
        <Modal title="Record delivery" onClose={() => setModal(null)}>
          <div className="pwt-field"><label className="pwt-label">Item</label>
            <select className="pwt-select" value={modal.itemId} onChange={(e) => { const it = data.items.find((x) => x.id === e.target.value); setModal({ ...modal, itemId: e.target.value, deliveredQty: it ? String(itemTotalQty(it)) : "" }); }}>
              {deliverableItems.map((it) => { const co = data.companies.find((c) => c.id === it.companyId); return <option key={it.id} value={it.id}>{itemLabel(it)} — {co?.name}</option>; })}
            </select></div>
          <div className="pwt-grid pwt-grid-2">
            <div className="pwt-field"><label className="pwt-label">Delivered quantity</label><input className="pwt-input" type="number" min="0" value={modal.deliveredQty} onChange={(e) => setModal({ ...modal, deliveredQty: e.target.value })} /></div>
            <div className="pwt-field"><label className="pwt-label">Rate paid by company (₩/pc)</label><input className="pwt-input" type="number" min="0" value={modal.ratePerPiece} onChange={(e) => setModal({ ...modal, ratePerPiece: e.target.value })} /></div>
          </div>
          <div className="pwt-field"><label className="pwt-label">Delivery date</label><input type="date" className="pwt-input" value={modal.deliveredDate} onChange={(e) => setModal({ ...modal, deliveredDate: e.target.value })} /></div>
          <div className="pwt-note">This closes out the item — once recorded, it won't appear in Work Assignment or Delivery lists again.</div>
          <button className="pwt-btn accent" style={{ width: "100%", justifyContent: "center" }} onClick={save}>Record delivery</button>
        </Modal>
      )}
      {editModal && (
        <Modal title="Edit delivery" onClose={() => setEditModal(null)}>
          <div className="pwt-grid pwt-grid-2">
            <div className="pwt-field"><label className="pwt-label">Delivered quantity</label><input className="pwt-input" type="number" min="0" value={editModal.deliveredQty} onChange={(e) => setEditModal({ ...editModal, deliveredQty: e.target.value })} /></div>
            <div className="pwt-field"><label className="pwt-label">Rate paid by company (₩/pc)</label><input className="pwt-input" type="number" min="0" value={editModal.ratePerPiece} onChange={(e) => setEditModal({ ...editModal, ratePerPiece: e.target.value })} /></div>
          </div>
          <div className="pwt-field"><label className="pwt-label">Delivery date</label><input type="date" className="pwt-input" value={editModal.deliveredDate} onChange={(e) => setEditModal({ ...editModal, deliveredDate: e.target.value })} /></div>
          <button className="pwt-btn accent" style={{ width: "100%", justifyContent: "center" }} onClick={saveEdit}>Save changes</button>
        </Modal>
      )}
      {confirm && <ConfirmDialog message={confirm.message} onYes={confirm.onYes} onNo={confirm.onNo} noHint={confirm.noHint} />}
      {printNote && <PrintDeliveryNote data={data} delivery={printNote} onClose={() => setPrintNote(null)} />}
    </div>
  );
}

function PrintDeliveryNote({ data, delivery, onClose }) {
  const item = data.items.find((i) => i.id === delivery.itemId);
  const co = data.companies.find((c) => c.id === item?.companyId);
  return (
    <div className="pwt-modal-overlay pwt-noprint" onClick={onClose}>
      <div className="pwt-modal wide" onClick={(e) => e.stopPropagation()}>
        <div className="pwt-modal-head pwt-noprint"><div className="pwt-modal-title">Delivery note preview</div><button className="pwt-close-btn" onClick={onClose}><X size={18} /></button></div>
        <div className="pwt-print-sheet">
          <h2 style={{ marginBottom: 2 }}>Delivery Note</h2>
          <div style={{ color: "#56645f", fontSize: 13, marginBottom: 18 }}>{item?.itemName} · {item?.id.slice(-6)} · {fmtDate(delivery.deliveredDate)}</div>
          <div className="pwt-grid pwt-grid-2" style={{ marginBottom: 16 }}>
            <div><div className="pwt-label">Company</div><div style={{ fontWeight: 600 }}>{co?.name}</div></div>
            <div><div className="pwt-label">Delivered quantity</div><div className="pwt-mono">{numFmt(delivery.deliveredQty)} pcs</div></div>
          </div>
          <table className="pwt-table">
            <thead><tr><th>Description</th><th>Qty</th><th>Rate</th><th>Amount</th></tr></thead>
            <tbody><tr><td>{item?.itemName}</td><td className="pwt-mono">{numFmt(delivery.deliveredQty)}</td><td className="pwt-mono">{won(delivery.ratePerPiece)}</td><td className="pwt-mono">{won(delivery.revenue)}</td></tr></tbody>
          </table>
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 14, fontSize: 17, fontWeight: 700 }}><span>Total</span><span className="pwt-mono">{won(delivery.revenue)}</span></div>
        </div>
        <div className="pwt-noprint" style={{ marginTop: 16 }}><button className="pwt-btn ghost" onClick={() => window.print()}><Printer size={14} /> Print / Save PDF</button></div>
      </div>
    </div>
  );
}

/* ----------------------------------- reports ----------------------------------------- */

function ReportsView({ data }) {
  const [fCompany, setFCompany] = useState("All");
  const [fMonthFrom, setFMonthFrom] = useState("");
  const [fMonthTo, setFMonthTo] = useState("");
  const [fStatus, setFStatus] = useState("All");
  const clearFilters = () => { setFCompany("All"); setFMonthFrom(""); setFMonthTo(""); setFStatus("All"); };

  const filteredDeliveries = data.deliveries.filter((d) => {
    const item = data.items.find((i) => i.id === d.itemId);
    const mk = monthKey(d.deliveredDate);
    return (fCompany === "All" || item?.companyId === fCompany) && (!fMonthFrom || mk >= fMonthFrom) && (!fMonthTo || mk <= fMonthTo);
  });
  const totalRevenue = filteredDeliveries.reduce((s, d) => s + Number(d.revenue || 0), 0);
  const byCompanyMonth = {};
  for (const d of filteredDeliveries) {
    const item = data.items.find((i) => i.id === d.itemId);
    const co = data.companies.find((c) => c.id === item?.companyId);
    const mk = monthKey(d.deliveredDate);
    const key = `${co?.id}|${mk}`;
    if (!byCompanyMonth[key]) byCompanyMonth[key] = { company: co?.name || "—", month: mk, revenue: 0, qty: 0 };
    byCompanyMonth[key].revenue += Number(d.revenue || 0);
    byCompanyMonth[key].qty += Number(d.deliveredQty || 0);
  }
  const rows = Object.values(byCompanyMonth).sort((a, b) => (a.month < b.month ? 1 : -1));

  const filteredItems = data.items.filter((it) =>
    (fCompany === "All" || it.companyId === fCompany) && (fStatus === "All" || itemStatus(it, data.deliveries) === fStatus)
  );
  let totalRaw = 0, totalWip = 0, totalFinished = 0;
  for (const it of filteredItems) { const s = itemStock(it, data.assignments, data.deliveries); totalRaw += s.raw; totalWip += s.wip; totalFinished += s.finished; }

  return (
    <div>
      <Header title="Reports" subtitle="Revenue and stock, at a glance" />
      <div className="pwt-filterbar">
        <div><label className="pwt-label">Company</label>
          <select className="pwt-select" value={fCompany} onChange={(e) => setFCompany(e.target.value)}>
            <option value="All">All companies</option>
            {data.companies.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select></div>
        <div><label className="pwt-label">Item status</label>
          <select className="pwt-select" value={fStatus} onChange={(e) => setFStatus(e.target.value)}>
            <option value="All">All</option><option value="Pending">Pending</option><option value="Completed">Completed</option>
          </select></div>
        <div className="pwt-fb-narrow"><label className="pwt-label">Month from</label><input type="month" className="pwt-input" value={fMonthFrom} onChange={(e) => setFMonthFrom(e.target.value)} /></div>
        <div className="pwt-fb-narrow"><label className="pwt-label">Month to</label><input type="month" className="pwt-input" value={fMonthTo} onChange={(e) => setFMonthTo(e.target.value)} /></div>
        <div className="pwt-fb-narrow"><button className="pwt-btn ghost sm" onClick={clearFilters}>Clear filters</button></div>
      </div>
      <div className="pwt-grid pwt-grid-2" style={{ marginBottom: 16 }}>
        <Stat label="Total revenue (filtered)" value={won(totalRevenue)} />
        <Stat label="Total stock (filtered items)" value={`${numFmt(totalRaw + totalWip + totalFinished)} pcs`} sub={`${numFmt(totalRaw)} raw · ${numFmt(totalWip)} WIP · ${numFmt(totalFinished)} finished`} />
      </div>
      <div className="pwt-card" style={{ marginBottom: 16 }}>
        <div className="pwt-stat-label" style={{ marginBottom: 10 }}>Company-wise monthly revenue</div>
        {rows.length === 0 ? <Empty text="No deliveries match these filters." /> : (
          <table className="pwt-table">
            <thead><tr><th>Company</th><th>Month</th><th>Pieces delivered</th><th>Revenue</th></tr></thead>
            <tbody>{rows.map((r, i) => <tr key={i}><td style={{ fontWeight: 600 }}>{r.company}</td><td>{r.month}</td><td className="pwt-mono">{numFmt(r.qty)}</td><td className="pwt-mono">{won(r.revenue)}</td></tr>)}</tbody>
          </table>
        )}
      </div>
      <div className="pwt-card">
        <div className="pwt-stat-label" style={{ marginBottom: 10 }}>Item status &amp; stock</div>
        {filteredItems.length === 0 ? <Empty text="No items match these filters." /> : (
          <table className="pwt-table">
            <thead><tr><th>Item</th><th>Company</th><th>Raw</th><th>WIP</th><th>Finished</th><th>Status</th></tr></thead>
            <tbody>
              {filteredItems.map((it) => {
                const co = data.companies.find((c) => c.id === it.companyId);
                const s = itemStock(it, data.assignments, data.deliveries);
                const status = itemStatus(it, data.deliveries);
                return (
                  <tr key={it.id}>
                    <td>{it.itemName} <span className="pwt-ledger-id">{it.id.slice(-6)}</span></td><td style={{ fontWeight: 600 }}>{co?.name || "—"}</td>
                    <td className="pwt-mono">{numFmt(s.raw)}</td><td className="pwt-mono">{numFmt(s.wip)}</td><td className="pwt-mono">{numFmt(s.finished)}</td>
                    <td><span className={"pwt-badge " + (status === "Completed" ? "completed" : "pending")}>{status}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

/* ------------------------------------- shared bits ------------------------------------- */

function Modal({ title, children, onClose, wide, narrow }) {
  return (
    <div className="pwt-modal-overlay" onClick={onClose}>
      <div className={"pwt-modal" + (wide ? " wide" : "") + (narrow ? " narrow" : "")} onClick={(e) => e.stopPropagation()}>
        <div className="pwt-modal-head"><div className="pwt-modal-title">{title}</div><button className="pwt-close-btn" onClick={onClose}><X size={18} /></button></div>
        {children}
      </div>
    </div>
  );
}
function ConfirmDialog({ message, onYes, onNo, noHint }) {
  return (
    <div className="pwt-modal-overlay" onClick={onNo} style={{ zIndex: 60 }}>
      <div className="pwt-modal narrow" onClick={(e) => e.stopPropagation()}>
        <div className="pwt-modal-title" style={{ marginBottom: 12 }}>Please confirm</div>
        <div style={{ fontSize: 13.5, marginBottom: 10, lineHeight: 1.5 }}>{message}</div>
        {noHint && <div className="pwt-note" style={{ marginBottom: 8 }}>{noHint}</div>}
        <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
          <button className="pwt-btn ghost" style={{ flex: 1, justifyContent: "center" }} onClick={onNo}>No</button>
          <button className="pwt-btn accent" style={{ flex: 1, justifyContent: "center" }} onClick={onYes}>Yes</button>
        </div>
      </div>
    </div>
  );
}
function Empty({ text }) {
  return (<div className="pwt-empty"><div className="icon"><AlertTriangle size={26} /></div>{text}</div>);
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
